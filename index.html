<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mekatikos · Haz tu pedido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF1DE;
    --cream-panel:#FFFBF2;
    --ink:#3A2A1E;
    --ink-soft:#6B584A;
    --gold:#E3A93F;
    --gold-dark:#8A5A12;
    --gold-bg:#F7E3B0;
    --cocoa:#A9793F;
    --cocoa-dark:#6B4A1E;
    --cocoa-bg:#EFDDB8;
    --pink:#D9527B;
    --pink-dark:#8E2C48;
    --pink-bg:#F7D3E0;
    --line:rgba(58,42,30,0.12);
    --shadow: 0 4px 16px rgba(58,42,30,0.08);
    --radius: 18px;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Nunito Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .dots{
    display:flex;
    justify-content:center;
    gap:22px;
    padding:18px 8px;
    flex-wrap:wrap;
  }
  .dots span{
    width:8px;height:8px;border-radius:50%;
    background:var(--ink);
    opacity:0.55;
  }
  .dots span:nth-child(3n+1){background:var(--pink);}
  .dots span:nth-child(3n+2){background:var(--gold);}

  header{
    max-width:760px;
    margin:0 auto;
    padding:38px 24px 8px;
    text-align:center;
  }
  .eyebrow{
    letter-spacing:3px;
    font-size:12px;
    font-weight:700;
    color:var(--gold-dark);
    text-transform:uppercase;
  }
  h1.brand{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:52px;
    margin:6px 0 4px;
    letter-spacing:1px;
  }
  .tagline{
    font-size:16px;
    color:var(--ink-soft);
    font-weight:600;
    margin-bottom:4px;
  }
  .subtag{
    font-size:14px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  main{
    max-width:760px;
    margin:0 auto;
    padding:8px 20px 140px;
  }

  .category{
    margin-top:34px;
  }
  .cat-badge{
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:20px;
    padding:10px 22px;
    border-radius:999px;
    margin-bottom:18px;
  }
  .cat-badge .ico{font-size:20px;}
  .cat-varios{background:var(--gold-bg); color:var(--gold-dark);}
  .cat-galletas{background:var(--cocoa-bg); color:var(--cocoa-dark);}
  .cat-dulces{background:var(--pink-bg); color:var(--pink-dark);}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:14px;
  }

  .card{
    background:var(--cream-panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    box-shadow:var(--shadow);
  }
  .card-left{display:flex; align-items:center; gap:12px; min-width:0;}
  .dot-ico{
    width:34px;height:34px;border-radius:50%;
    flex:none;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
  }
  .cat-varios .dot-ico-ref{background:var(--gold);}
  .item-name{
    font-weight:700;
    font-size:15.5px;
    line-height:1.25;
  }
  .item-price{
    font-size:13.5px;
    color:var(--ink-soft);
    font-weight:600;
    margin-top:2px;
  }

  .stepper{
    display:flex;
    align-items:center;
    gap:10px;
    flex:none;
  }
  .stepper button{
    width:30px;height:30px;
    border-radius:50%;
    border:1.5px solid var(--line);
    background:#fff;
    font-size:17px;
    font-weight:800;
    color:var(--ink);
    cursor:pointer;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s ease, background .12s ease;
  }
  .stepper button:active{transform:scale(0.9);}
  .stepper button.add{background:var(--ink); color:var(--cream); border-color:var(--ink);}
  .qty{
    min-width:16px;
    text-align:center;
    font-weight:800;
    font-size:15px;
  }

  .cart-bar{
    position:fixed;
    left:0; right:0; bottom:0;
    background:var(--ink);
    color:var(--cream);
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    transform:translateY(110%);
    transition:transform .25s ease;
    z-index:20;
  }
  .cart-bar.show{transform:translateY(0);}
  .cart-info{font-size:14px; font-weight:700;}
  .cart-info .total{
    font-family:'Baloo 2', sans-serif;
    font-size:20px;
    margin-left:8px;
  }
  .cart-btn{
    background:var(--pink);
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:999px;
    font-weight:800;
    font-size:14.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    white-space:nowrap;
  }
  .cart-btn:active{transform:scale(0.97);}

  .overlay{
    position:fixed; inset:0;
    background:rgba(58,42,30,0.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:30;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--cream-panel);
    width:100%;
    max-width:760px;
    border-radius:22px 22px 0 0;
    padding:24px 22px 26px;
    max-height:80vh;
    overflow-y:auto;
  }
  .sheet h2{
    font-family:'Baloo 2', sans-serif;
    font-size:24px;
    margin:0 0 4px;
  }
  .sheet .close{
    float:right;
    background:none; border:none;
    font-size:20px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .cart-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 0;
    border-bottom:1px dashed var(--line);
    gap:10px;
  }
  .cart-row .name{font-weight:700; font-size:14.5px;}
  .cart-row .sub{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .cart-row .line-total{font-weight:800; font-size:14.5px; white-space:nowrap;}

  .empty-msg{
    text-align:center;
    color:var(--ink-soft);
    padding:20px 0;
    font-size:14px;
  }

  .totals{
    margin-top:14px;
    padding-top:14px;
    border-top:2px solid var(--ink);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .totals .label{font-weight:700; font-size:15px;}
  .totals .amount{font-family:'Baloo 2', sans-serif; font-size:26px;}

  .field{margin-top:16px;}
  .field label{display:block; font-size:13px; font-weight:700; color:var(--ink-soft); margin-bottom:6px;}
  .field input, .field textarea{
    width:100%;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:11px 13px;
    font-family:inherit;
    font-size:14.5px;
    background:#fff;
    color:var(--ink);
  }
  .field textarea{resize:vertical; min-height:60px;}

  .pay-options{
    display:flex;
    gap:10px;
  }
  .pay-option{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:11px 10px;
    cursor:pointer;
    font-weight:700;
    font-size:14px;
    background:#fff;
    transition:border-color .12s ease, background .12s ease;
  }
  .pay-option input{margin:0;}
  .pay-option:has(input:checked){
    border-color:var(--pink);
    background:var(--pink-bg);
    color:var(--pink-dark);
  }

  .whatsapp-btn{
    width:100%;
    margin-top:18px;
    background:#25D366;
    color:#fff;
    border:none;
    padding:15px;
    border-radius:14px;
    font-weight:800;
    font-size:15.5px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }
  .whatsapp-btn:disabled{opacity:0.5; cursor:not-allowed;}

  footer{
    text-align:center;
    padding:30px 20px 90px;
    color:var(--ink-soft);
    font-size:13px;
  }

  @media (max-width:480px){
    h1.brand{font-size:40px;}
    .cart-info .total{font-size:17px;}
  }
</style>
</head>
<body>

<div class="dots" aria-hidden="true">
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<header>
  <div class="eyebrow">Pedidos en línea · 2026</div>
  <h1 class="brand">Mekatikos</h1>
  <div class="tagline">Dulces · Galletas · Varios</div>
  <div class="subtag">Elige tus productos y envía tu pedido por WhatsApp</div>
</header>

<main id="main"></main>

<div class="cart-bar" id="cartBar">
  <div class="cart-info">
    <span id="cartCount">0 productos</span>
    <span class="total" id="cartTotalMini">$0</span>
  </div>
  <button class="cart-btn" id="openCart" aria-label="Ver pedido">
    Ver pedido
  </button>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <button class="close" id="closeCart" aria-label="Cerrar">&times;</button>
    <h2>Tu pedido</h2>
    <div id="cartRows"></div>
    <div class="totals">
      <span class="label">Total</span>
      <span class="amount" id="sheetTotal">$0</span>
    </div>

    <div class="field">
      <label for="custName">Tu nombre</label>
      <input type="text" id="custName" placeholder="Nombre y apellido">
    </div>
    <div class="field">
      <label for="custAddr">Dirección de entrega</label>
      <input type="text" id="custAddr" placeholder="Dirección o punto de referencia">
    </div>
    <div class="field">
      <label for="custNote">Notas (opcional)</label>
      <textarea id="custNote" placeholder="Ej: sin azúcar, entregar después de las 5pm"></textarea>
    </div>

    <div class="field">
      <label>Forma de pago</label>
      <div class="pay-options">
        <label class="pay-option">
          <input type="radio" name="payType" value="Pago" checked>
          <span>Pago ahora</span>
        </label>
        <label class="pay-option">
          <input type="radio" name="payType" value="Fiado">
          <span>Fiado</span>
        </label>
      </div>
    </div>

    <button class="whatsapp-btn" id="sendOrder">
      Enviar pedido por WhatsApp
    </button>
  </div>
</div>

<footer>Mekatikos © 2026</footer>

<script>
  // Número de WhatsApp de la tienda (formato internacional, sin + ni espacios)
  // Ejemplo Colombia: "57" + número a 10 dígitos
  const WHATSAPP_NUMBER = "573163540560";

  const PRODUCTS = [
    {cat:"varios", name:"Maduritos", price:2000},
    {cat:"varios", name:"Platanitos", price:2000},
    {cat:"varios", name:"Picada", price:2000},
    {cat:"varios", name:"Rosquillas", price:1500},

    {cat:"galletas", name:"Oreo x4", price:1500},
    {cat:"galletas", name:"Tosh Miel", price:1500},
    {cat:"galletas", name:"Oreo x6", price:2000},
    {cat:"galletas", name:"Festival Vainilla", price:1200},
    {cat:"galletas", name:"Festival Limón", price:1200},
    {cat:"galletas", name:"Club Social", price:1200},
    {cat:"galletas", name:"Ducales", price:1200},
    {cat:"galletas", name:"Piazza Vainilla", price:600},

    {cat:"dulces", name:"Chocolatina", price:1200},
    {cat:"dulces", name:"Quipitos", price:800},
    {cat:"dulces", name:"Bon Bon Bum", price:600},
    {cat:"dulces", name:"Trident", price:400},
    {cat:"dulces", name:"Halls Rojo", price:300},
    {cat:"dulces", name:"Nucita", price:1000},
  ];

  const CATEGORIES = [
    {key:"varios", label:"Varios", icon:"\uD83E\uDD59", badgeClass:"cat-varios"},
    {key:"galletas", label:"Galletas", icon:"\uD83C\uDF6A", badgeClass:"cat-galletas"},
    {key:"dulces", label:"Dulces", icon:"\uD83C\uDF6C", badgeClass:"cat-dulces"},
  ];

  const cart = {};

  function fmt(n){
    return "$" + n.toLocaleString("es-CO");
  }

  function renderMenu(){
    const main = document.getElementById("main");
    main.innerHTML = "";
    CATEGORIES.forEach(cat => {
      const items = PRODUCTS.filter(p => p.cat === cat.key);
      const section = document.createElement("section");
      section.className = "category";
      section.innerHTML = `
        <div class="cat-badge ${cat.badgeClass}">
          <span class="ico">${cat.icon}</span>${cat.label}
        </div>
        <div class="grid" id="grid-${cat.key}"></div>
      `;
      main.appendChild(section);
      const grid = section.querySelector(`#grid-${cat.key}`);
      items.forEach(item => {
        const row = document.createElement("div");
        row.className = "card";
        row.innerHTML = `
          <div class="card-left">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-price">${fmt(item.price)}</div>
            </div>
          </div>
          <div class="stepper">
            <button class="minus" aria-label="Quitar uno">-</button>
            <span class="qty">0</span>
            <button class="add" aria-label="Agregar uno">+</button>
          </div>
        `;
        const qtySpan = row.querySelector(".qty");
        const minus = row.querySelector(".minus");
        const add = row.querySelector(".add");

        function sync(){
          qtySpan.textContent = cart[item.name] ? cart[item.name].qty : 0;
        }
        add.addEventListener("click", () => {
          if(!cart[item.name]) cart[item.name] = {qty:0, price:item.price};
          cart[item.name].qty++;
          sync();
          updateCartBar();
        });
        minus.addEventListener("click", () => {
          if(cart[item.name] && cart[item.name].qty > 0){
            cart[item.name].qty--;
            if(cart[item.name].qty === 0) delete cart[item.name];
          }
          sync();
          updateCartBar();
        });
        grid.appendChild(row);
      });
    });
  }

  function cartTotals(){
    let count = 0, total = 0;
    Object.values(cart).forEach(c => { count += c.qty; total += c.qty * c.price; });
    return {count, total};
  }

  function updateCartBar(){
    const {count, total} = cartTotals();
    const bar = document.getElementById("cartBar");
    document.getElementById("cartCount").textContent = count === 1 ? "1 producto" : count + " productos";
    document.getElementById("cartTotalMini").textContent = fmt(total);
    if(count > 0) bar.classList.add("show"); else bar.classList.remove("show");
  }

  function renderCartSheet(){
    const rows = document.getElementById("cartRows");
    const entries = Object.entries(cart);
    if(entries.length === 0){
      rows.innerHTML = `<div class="empty-msg">Aún no has agregado productos.</div>`;
    } else {
      rows.innerHTML = entries.map(([name, c]) => `
        <div class="cart-row">
          <div>
            <div class="name">${name}</div>
            <div class="sub">${c.qty} x ${fmt(c.price)}</div>
          </div>
          <div class="line-total">${fmt(c.qty * c.price)}</div>
        </div>
      `).join("");
    }
    const {total} = cartTotals();
    document.getElementById("sheetTotal").textContent = fmt(total);
    document.getElementById("sendOrder").disabled = entries.length === 0;
  }

  document.getElementById("openCart").addEventListener("click", () => {
    renderCartSheet();
    document.getElementById("overlay").classList.add("show");
  });
  document.getElementById("closeCart").addEventListener("click", () => {
    document.getElementById("overlay").classList.remove("show");
  });
  document.getElementById("overlay").addEventListener("click", (e) => {
    if(e.target.id === "overlay") document.getElementById("overlay").classList.remove("show");
  });

  // URL de Apps Script conectada a la hoja de Google (pestaña "Pedidos")
  const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxl0NMGvZGa6hD2IrR3rYRKFHNJ20OocXJSQOLLdHwjFhKatZhvrgMRuJtE8GFKo1JH/exec";

  document.getElementById("sendOrder").addEventListener("click", () => {
    const entries = Object.entries(cart);
    if(entries.length === 0) return;
    const name = document.getElementById("custName").value.trim();
    const addr = document.getElementById("custAddr").value.trim();
    const note = document.getElementById("custNote").value.trim();
    const payType = document.querySelector('input[name="payType"]:checked').value;
    const {total} = cartTotals();

    const now = new Date();
    const orderNumber = String(now.getTime()).slice(-5);

    // Guardar el pedido en la hoja de Google (no bloquea el envío por WhatsApp si falla)
    try {
      fetch(SHEET_WEBHOOK_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {"Content-Type": "text/plain"},
        body: JSON.stringify({
          items: entries.map(([itemName, c]) => ({producto: itemName, cantidad: c.qty})),
          cliente: name,
          direccion: addr,
          notas: note,
          pedido: orderNumber,
          pago: payType
        })
      });
    } catch(err) {
      console.error("No se pudo guardar el pedido en la hoja:", err);
    }

    const dateStr = now.toLocaleDateString("es-CO", {day:"2-digit", month:"2-digit", year:"numeric"});
    const timeStr = now.toLocaleTimeString("es-CO", {hour:"2-digit", minute:"2-digit"});

    function padName(str, len){
      str = str.length > len ? str.slice(0, len - 1) + "." : str;
      return str.padEnd(len, " ");
    }
    function padLeft(str, len){
      return String(str).padStart(len, " ");
    }

    let lines = "";
    lines += "```\n";
    lines += "     M E K A T I K O S\n";
    lines += "-------------------------\n";
    lines += `Pedido #${orderNumber}\n`;
    lines += `${dateStr}  ${timeStr}\n`;
    lines += "-------------------------\n";
    lines += `${padName("Producto", 13)}${padLeft("Cant", 4)}${padLeft("Total", 8)}\n`;
    lines += "-------------------------\n";
    entries.forEach(([itemName, c]) => {
      const lineTotal = (c.qty * c.price).toLocaleString("es-CO");
      lines += `${padName(itemName, 13)}${padLeft(c.qty, 4)}${padLeft(lineTotal, 8)}\n`;
    });
    lines += "-------------------------\n";
    lines += `${padName("TOTAL", 17)}${padLeft(total.toLocaleString("es-CO"), 8)}\n`;
    lines += "```\n";

    let msg = encodeURIComponent(lines);
    msg += "%0A";
    if(name) msg += encodeURIComponent(`Cliente: ${name}`) + "%0A";
    if(addr) msg += encodeURIComponent(`Dirección: ${addr}`) + "%0A";
    if(note) msg += encodeURIComponent(`Notas: ${note}`) + "%0A";
    msg += encodeURIComponent(`Forma de pago: ${payType}`) + "%0A";

    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
    window.open(url, "_blank");
  });

  renderMenu();
  updateCartBar();
</script>

</body>
</html>
